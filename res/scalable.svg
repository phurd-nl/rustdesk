<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- NextSession app badge. Family mark: orange-gradient disc + white folded "N".
       Palette sampled from the NextVault family: #F4A124 -> #EB8E14. -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6A828"/>
      <stop offset="1" stop-color="#E9890F"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="url(#grad)"/>
  <!-- white "N": left bar (with folded lower-left foot), diagonal, right bar -->
  <g fill="#ffffff">
    <polygon points="74,70 104,70 104,186 90,186 74,160"/>
    <polygon points="74,70 104,70 182,186 152,186"/>
    <rect x="152" y="70" width="30" height="116"/>
  </g>
</svg>
