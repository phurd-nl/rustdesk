# NextSession release build — Linux + Windows (macOS deferred, see disabled job below).
# Builds the branded Flutter client on GitHub-hosted runners (no Mac/PC hardware
# needed) and publishes installers. custom.txt is committed and copied next to the
# binary by build.py, so the build needs no branding secrets.
#
# Triggers: push a tag like `v1.4.8`, or run manually (Actions → Run workflow).
# Unsigned for now; signing is wired as commented placeholders to add later.
name: nextsession-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  # GitHub Actions binary cache for vcpkg (keeps the ffmpeg/aom build off the hot path).
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake curl gcc git g++ \
            libayatana-appindicator3-dev libasound2-dev libc6-dev libclang-dev \
            libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libpam0g-dev libpulse-dev libva-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev llvm-dev nasm ninja-build pkg-config \
            autoconf automake libtool autoconf-archive yasm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ubuntu-22.04

      - name: Export GitHub Actions cache env (for vcpkg x-gha)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: vcpkg install (x64-linux)
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Apply Flutter dropdown patch (3.24.x)
        run: |
          FLUTTER_ROOT="$(dirname "$(dirname "$(which flutter)")")"
          git -C "$FLUTTER_ROOT" apply "$GITHUB_WORKSPACE/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff" || true
          flutter config --enable-linux-desktop

      - name: Generate Rust<->Dart bridge
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features uuid --locked
          (cd flutter && flutter pub get)
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart

      - name: Build .deb
        env:
          DEB_ARCH: amd64
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: python3 ./build.py --flutter

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: nextsession-linux-deb
          path: ./nextsession-*.deb
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    env:
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
    steps:
      - name: Export GitHub Actions cache env (for vcpkg x-gha)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM + Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: vcpkg install (x64-windows-static)
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT\installed"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Swap in RustDesk's Flutter engine (required for 3.24.5 Windows)
        shell: pwsh
        run: |
          flutter precache --windows
          $engineDir = "$(dirname (dirname (Get-Command flutter).Source))/cache/artifacts/engine/windows-x64-release"
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          # NOTE: if this path is wrong on the runner, adjust to the flutter cache engine dir.
          Get-ChildItem windows-x64-release | Move-Item -Destination $engineDir -Force

      - name: Apply Flutter dropdown patch (3.24.x)
        shell: bash
        run: |
          FLUTTER_ROOT="$(dirname "$(dirname "$(which flutter)")")"
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$FLUTTER_ROOT" || true
          git -C "$FLUTTER_ROOT" apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Generate Rust<->Dart bridge
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features uuid --locked
          (cd flutter && flutter pub get)
          "$USERPROFILE/.cargo/bin/flutter_rust_bridge_codegen" \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart

      - name: Build installer
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
        run: python3 ./build.py --flutter

      - name: Rename installer to NextSession
        shell: pwsh
        run: |
          Get-ChildItem -Filter 'rustdesk-*-install.exe' | ForEach-Object {
            $new = $_.Name -replace '^rustdesk-', 'nextsession-'
            Rename-Item $_.FullName $new
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nextsession-windows-installer
          path: ./nextsession-*-install.exe
          if-no-files-found: error

  # ----------------------------------------------------------------------------
  # macOS — DEFERRED. Enable by removing `if: false` once you have an Apple
  # Developer account; add APPLE_* signing secrets and a notarization step.
  # Build needs a macos-14 runner, Xcode, and `python3 build.py --flutter` which
  # calls build_flutter_dmg(). custom.txt must land in NextSession.app/Contents/Resources.
  # ----------------------------------------------------------------------------
  build-macos:
    if: false
    runs-on: macos-14
    steps:
      - run: echo "macOS build deferred — see nextsession-release.yml and docs/mass-deploy.md"

  release:
    # Attach artifacts to a GitHub Release when a tag was pushed.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
